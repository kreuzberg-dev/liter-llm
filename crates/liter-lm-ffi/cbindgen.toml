language = "C"
include_guard = "LITER_LM_FFI_H"
pragma_once = true
header = "/* Auto-generated C bindings for liter-lm */"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
documentation = true
line_length = 100
after_includes = """
/* Symbol visibility */
#ifndef LITER_LM_EXPORT
  #if defined(LITER_LM_STATIC)
    #define LITER_LM_EXPORT
  #elif defined(_WIN32) || defined(__CYGWIN__)
    #ifdef LITER_LM_BUILDING
      #define LITER_LM_EXPORT __declspec(dllexport)
    #else
      #define LITER_LM_EXPORT __declspec(dllimport)
    #endif
  #elif defined(__GNUC__) || defined(__clang__)
    #define LITER_LM_EXPORT __attribute__((visibility("default")))
  #else
    #define LITER_LM_EXPORT
  #endif
#endif
"""

[fn]
prefix = "LITER_LM_EXPORT"

[export]
include = []

[parse]
parse_deps = false
include = []
