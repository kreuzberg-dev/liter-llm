$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
description: Universal LM API client with polyglot bindings — unified access to 100+ LLM providers with native bindings for Rust, Python, TypeScript, Go, Java, Ruby, PHP, C#, Elixir, and WebAssembly.
gitignore: true
name: Liter-LM

includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    merge_strategy: local-override
  - name: kreuzberg-cicd
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/cicd
    merge_strategy: local-override
  - name: kreuzberg-infrastructure
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/infrastructure
    merge_strategy: local-override
  - name: kreuzberg-e2e-generator
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/e2e-generator
    merge_strategy: local-override

builtins:
  - rust
  - python
  - pyo3
  - typescript
  - napi-rs
  - go
  - java
  - ruby
  - magnus
  - php
  - ext-php-rs
  - csharp
  - elixir
  - rustler
  - wasm
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

presets:
  - claude
  - gemini
  - codex

compression:
  level: moderate
version: "3.0"
