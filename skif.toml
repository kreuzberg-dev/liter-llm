languages = ["python", "node", "ruby", "php", "ffi", "go", "java", "csharp", "elixir", "wasm"]

[crate]
name = "liter-llm"
core_import = "liter_llm"
sources = [
    "crates/liter-llm/src/lib.rs",
    "crates/liter-llm/src/types/audio.rs",
    "crates/liter-llm/src/types/batch.rs",
    "crates/liter-llm/src/types/chat.rs",
    "crates/liter-llm/src/types/common.rs",
    "crates/liter-llm/src/types/embedding.rs",
    "crates/liter-llm/src/types/files.rs",
    "crates/liter-llm/src/types/image.rs",
    "crates/liter-llm/src/types/models.rs",
    "crates/liter-llm/src/types/moderation.rs",
    "crates/liter-llm/src/types/ocr.rs",
    "crates/liter-llm/src/types/rerank.rs",
    "crates/liter-llm/src/types/responses.rs",
    "crates/liter-llm/src/types/search.rs",
]
version_from = "Cargo.toml"
workspace_root = "."

# Generate all extracted types except those in [exclude].
# No [include] section — all public types from sources are included.

# Exclude types/functions that can't cross FFI cleanly
[exclude]
functions = [
    "model_pricing",        # returns &ModelPricing (reference — can't cross FFI)
    "count_tokens",         # in liter_llm::tokenizer, not re-exported
    "count_request_tokens", # in liter_llm::tokenizer, not re-exported
]
types = [
    "CredentialProvider",
    "CacheStore",
    "LlmHook",
    "BudgetState",
    "ClientConfig",
    "ClientConfigBuilder",
    "FileConfig",
    "ManagedClient",
    "DefaultClient",
    # Batch/File/Response types not in include list but may be extracted
    "CreateBatchRequest",
    "BatchObject",
    "BatchRequestCounts",
    "BatchListResponse",
    "BatchListQuery",
    "CreateTranscriptionRequest",
    "StreamOptions",
    "CacheBackend",               # cfg-gated enum variant with HashMap
    "CachedResponse",             # wraps LlmResponse tower type
]

[output]
python = "crates/liter-llm-py/src/"
node = "crates/liter-llm-node/src/"
ruby = "packages/ruby/ext/liter_llm_rb/src/"
php = "crates/liter-llm-php/src/"
ffi = "crates/liter-llm-ffi/src/"
elixir = "packages/elixir/native/liter_llm_rustler/src/"
wasm = "crates/liter-llm-wasm/src/"

[python]
module_name = "_internal_bindings"

[python.stubs]
output = "packages/python/liter_llm/"

[node]
package_name = "@liter-llm/node"

[ffi]
prefix = "liter_llm"
header_name = "liter_llm.h"
lib_name = "liter_llm_ffi"

[go]
module = "github.com/kreuzberg-dev/liter-llm-go"
package_name = "literllm"

[java]
package = "dev.kreuzberg.literllm"

[csharp]
namespace = "LiterLlm"

[elixir]
app_name = "liter_llm"

[scaffold]
description = "Universal LLM API client"
license = "MIT"
repository = "https://github.com/kreuzberg-dev/liter-llm"
authors = ["Kreuzberg Team"]
keywords = ["llm", "openai", "anthropic"]
