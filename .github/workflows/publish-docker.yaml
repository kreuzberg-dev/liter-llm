name: Publish Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kreuzberg-dev/liter-llm:${{ steps.version.outputs.tag }}
            ghcr.io/kreuzberg-dev/liter-llm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=publish-docker
          labels: |
            org.opencontainers.image.source=https://github.com/kreuzberg-dev/liter-llm
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.description=LiterLLM — OpenAI-compatible LLM proxy server
            org.opencontainers.image.licenses=MIT
